name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile-check package sources
        run: |
          python -m py_compile $(find python/strataos_demo_integrations -name '*.py')

  frontend-syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check package.json is valid
        run: node -e "require('./frontend/package.json')"
